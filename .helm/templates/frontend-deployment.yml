apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      components: {{ .Values.componentsLabel }}
  template:
    metadata:
      name: {{ .Values.name }}
      labels:
        components: {{ .Values.componentsLabel }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecertName }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image }}:{{ .Values.imageTag }}"
          ports:
            - containerPort: {{ .Values.containerPort }}
          resources: {{ .Values.resources | toYaml | nindent 12 }}